<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Se Music Player</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
    #login-screen h1 { font-size: 24px; font-weight: 500; }
    #login-screen p { color: #aaa; font-size: 13px; }
    #login-btn { padding: 12px 28px; background: #fff; color: #000; border: none; border-radius: 24px; font-size: 15px; cursor: pointer; }
    #login-btn:hover { background: #eee; }
    #app { display: none; flex-direction: column; height: 100vh; }
    #folder-bar { padding: 12px 16px; border-bottom: 1px solid #222; font-size: 13px; color: #aaa; display: flex; align-items: center; gap: 8px; }
    #folder-bar button { background: none; border: none; color: #aaa; cursor: pointer; font-size: 13px; }
    #folder-bar button:hover { color: #fff; }
    #file-list { flex: 1; overflow-y: auto; padding: 16px; }
    #loading { text-align: center; color: #aaa; font-size: 13px; padding: 2rem; }
    .file-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
    .file-item:hover { background: #1a1a1a; }
    .file-item.playing { background: #1a1a1a; color: #1db954; }
    .file-icon { font-size: 18px; width: 24px; text-align: center; }
    .file-name { flex: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #player { background: #1a1a1a; padding: 20px 16px; border-top: 1px solid #333; }
    #now-playing { font-size: 13px; color: #aaa; margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #now-playing span { color: #fff; font-weight: 500; }
    .controls { display: flex; align-items: center; gap: 12px; }
    .ctrl-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 4px; }
    .ctrl-btn:hover { color: #1db954; }
    #progress { flex: 1; accent-color: #1db954; cursor: pointer; }
    #time { font-size: 12px; color: #aaa; min-width: 90px; text-align: right; }
    audio { display: none; }
  </style>
</head>
<body>
  <div id="login-screen">
    <h1>Se Music Player</h1>
    <p>Google Drive의 MP3를 재생합니다</p>
    <button id="login-btn" onclick="signIn()">Google로 시작하기</button>
  </div>

  <div id="app">
    <div id="folder-bar">
      <button onclick="goUp()">← 뒤로</button>
      <span id="current-path">내 드라이브</span>
    </div>
    <div id="file-list">
      <div id="loading" style="display:none">불러오는 중...</div>
    </div>
    <div id="player">
      <div id="now-playing">재생 중: <span id="track-name">-</span></div>
      <audio id="audio"></audio>
      <div class="controls">
        <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
        <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
        <input type="range" id="progress" value="0" min="0" max="100" step="0.1" oninput="seek(this.value)">
        <span id="time">0:00 / 0:00</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
